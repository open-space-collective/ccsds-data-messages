name: Release

# Publishes to PyPI on a version tag (e.g. v0.1.0) using Trusted Publishing
# (OpenID Connect) - no API token is stored in the repository.
#
# The package version is derived from the git tag by hatch-vcs, so the tag is
# the single source of truth - there is nothing to keep in sync by hand.
#
# One-time setup: on PyPI, add a Trusted Publisher for this project pointing at
# this repository and the `pypi` environment
# (https://docs.pypi.org/trusted-publishers/).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history + tags to derive the version

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
